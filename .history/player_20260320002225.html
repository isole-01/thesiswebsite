<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Audio player</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 24px auto; padding: 0 16px; }
    .meta { margin-top: 16px; }
    dt { font-weight: 600; }
    dd { margin: 0 0 12px 0; }
    code { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; }
    section { margin: 16px 0; }
    audio { width: 100%; margin: 10px 0; }
  </style>
</head>
<body>
  <div id="clips"></div>

  <script>
    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function isEmpty(v) {
      return v === null || v === undefined || v === "" || v === "None";
    }

    function fmtList(v) {
      if (!Array.isArray(v) || v.length === 0) return "";
      return v
        .filter(x => !isEmpty(x))
        .map(x => String(x))
        .join(", ");
    }

    const id = getParam("id");
    const clipsEl = document.getElementById("clips");

    if (!id) {
      clipsEl.textContent = "Add a link like player.html?id=bluestextonly";
      throw new Error("Missing id");
    }

    async function pickAudioSrc(baseNoExt) {
      const mp3 = baseNoExt + ".mp3";
      const wav = baseNoExt + ".wav";

      const r1 = await fetch(mp3, { method: "HEAD" }).catch(() => null);
      if (r1 && r1.ok) return mp3;

      const r2 = await fetch(wav, { method: "HEAD" }).catch(() => null);
      if (r2 && r2.ok) return wav;

      return null;
    }

    function renderMeta(prompt, rewards) {
      const hasPrompt = !isEmpty(prompt);
      const rewardsText = fmtList(rewards);
      const hasRewards = rewardsText !== "";

      if (!hasPrompt && !hasRewards) return;

      const section = document.createElement("section");
      const dl = document.createElement("dl");

      if (hasPrompt) {
        const dt = document.createElement("dt");
        dt.textContent = "Prompt";
        const dd = document.createElement("dd");
        dd.textContent = String(prompt);
        dl.appendChild(dt);
        dl.appendChild(dd);
      }

      if (hasRewards) {
        const dt = document.createElement("dt");
        dt.textContent = "Reward Functions";
        const dd = document.createElement("dd");
        dd.textContent = rewardsText;
        dl.appendChild(dt);
        dl.appendChild(dd);
      }

      section.appendChild(dl);
      clipsEl.appendChild(section);
    }

    async function renderAudio(folder, stem) {
      const section = document.createElement("section");
      const audio = document.createElement("audio");

      audio.controls = true;
      audio.preload = "metadata";

      const src = await pickAudioSrc(`${folder}${stem}`);
      if (!src) return;

      audio.src = src;
      section.appendChild(audio);
      clipsEl.appendChild(section);
    }

    (async () => {
      const folder = `audio/${id}/`;
      const res = await fetch(folder + "manifest.json").catch(() => null);

      if (!(res && res.ok)) {
        clipsEl.textContent = "Error loading manifest.";
        return;
      }

      const manifest = await res.json();

      renderMeta(manifest.prompt, manifest.finetuned_rewards);

      const clips = Array.isArray(manifest.clips) ? manifest.clips : [];
      for (const stem of clips) {
        await renderAudio(folder, stem);
      }
    })().catch(err => {
      clipsEl.textContent = "Error.";
      console.error(err);
    });
  </script>
</body>
</html>
